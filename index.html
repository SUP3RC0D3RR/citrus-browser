<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Citrus Browser</title>
    <style>
        :root { --orange: #ff9500; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
        }
        
        .container { height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 10px 14px; background: #0f0f0f; font-size: 1.8rem; font-weight: 900; color: var(--orange); }
        
        .tabs-container { display: flex; background: #141414; padding: 6px 10px 0; gap: 5px; border-bottom: 1px solid #222; }
        .tab { 
            background: #1a1a1a; 
            padding: 10px 18px; 
            border-radius: 10px 10px 0 0; 
            cursor: pointer; 
            border: 1px solid #333;
            border-bottom: none;
            transition: all 0.3s ease;
        }
        .tab.active { background: #252525; color: var(--orange); border-color: var(--orange); }
        .new-tab { background: #282828; color: var(--orange); border: none; padding: 0 15px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; font-size: 1.2rem; }
        
        header { padding: 10px 12px; background: #1a1a1a; display: flex; gap: 8px; align-items: center; }
        .nav-buttons { display: flex; gap: 6px; }
        .nav-buttons button { 
            background: #282828; 
            color: #fff; 
            border: 1px solid rgba(255,149,0,0.2); 
            width: 40px; 
            height: 40px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Smooth, Isolated Rotation Rules (No warping) */
        .nav-buttons button span { 
            display: inline-block; 
            width: max-content;
            height: max-content;
            transform-origin: center center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .nav-buttons button span.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { 
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); } 
        }

        .url-bar { 
            flex: 1; 
            padding: 11px 16px; 
            background: #1e1e1e; 
            border: 2px solid #3c3c3c; 
            color: #fff; 
            border-radius: 50px; 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .url-bar:focus { border-color: var(--orange); outline: none; }
        
        /* Fixed Perfect Fullscreen Content Box Layout */
        .content { flex: 1; position: relative; background: #0a0a0a; width: 100%; height: 100%; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">citrus</div>
    <div class="tabs-container">
        <div id="tabs" style="display:flex; gap:5px;"></div>
        <button class="new-tab" onclick="newTab()">+</button>
    </div>

    <header>
        <div class="nav-buttons">
            <button onclick="goBack()">←</button>
            <button onclick="goForward()">→</button>
            <button onclick="refreshPage()"><span id="refresh-icon">↻</span></button>
        </div>
        <input type="text" id="url-input" class="url-bar" placeholder="Search or enter URL" onclick="handleUrlClick(this)" onkeypress="if(event.key==='Enter') loadUrl()">
    </header>

    <div class="content" id="content-area"></div>
</div>

<script>
let tabs = [];
let currentTab = 0;

function isLikelyURL(str) {
    if (!str) return false;
    const lower = str.toLowerCase().trim();
    if (lower.startsWith('http')) return true;
    if (lower.includes(' ')) return false;
    const tlds = ['.com','.net','.org','.io','.co','.uk','.de','.in','.app','.xyz','.me','.gg'];
    return tlds.some(tld => lower.endsWith(tld));
}

function createTab() {
    tabs.push({ url: "citrus://home" });
    currentTab = tabs.length - 1;
    render();
    
    // Auto-select empty home state instantly for seamless typing
    const input = document.getElementById('url-input');
    if (input) {
        input.focus();
        input.select();
    }
}

function render() {
    // Render Navigation Tabs Header
    const tabsDiv = document.getElementById('tabs');
    tabsDiv.innerHTML = '';
    tabs.forEach((tab, i) => {
        tabsDiv.innerHTML += `<div class="tab ${i === currentTab ? 'active' : ''}" onclick="switchTab(${i})">Tab ${i+1}</div>`;
    });

    // Handle Address Bar Sync
    const area = document.getElementById('content-area');
    const input = document.getElementById('url-input');
    input.value = tabs[currentTab].url;

    // Render Webview Output Frame
    if (tabs[currentTab].url === "citrus://home") {
        area.innerHTML = `
            <div style="position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                <h1 style="font-size: 4rem; font-weight: 900; background: linear-gradient(90deg, #ff9500, #ffcc66); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">citrus</h1>
                <p style="color: #666; margin-top: 5px;">Browse the internet freely</p>
            </div>`;
    } else {
        // !!! REPLACE THE LINK BELOW WITH YOUR ACTUAL LIVE RENDER APP LINK !!!
        const backendBaseUrl = "https://miniprox.onrender.com/";
        
        // Target name attribute grants the frame its own isolated historical stack
        area.innerHTML = `<iframe name="citrus-frame" src="${backendBaseUrl}?url=${encodeURIComponent(tabs[currentTab].url)}"></iframe>`;
    }
}

function loadUrl() {
    let input = document.getElementById('url-input').value.trim();
    if (!input) return;

    if (input.toLowerCase() === "citrus://home") {
        tabs[currentTab].url = "citrus://home";
    } else {
        if (isLikelyURL(input)) {
            tabs[currentTab].url = input.startsWith('http') ? input : 'https://' + input;
        } else {
            tabs[currentTab].url = `https://duckduckgo.com/?q=${encodeURIComponent(input)}`;
        }
    }
    render();
}

function switchTab(index) { currentTab = index; render(); }
function newTab() { createTab(); }
function handleUrlClick(input) { if (input.value === "citrus://home") input.select(); }

// Native Framed History Traversing
function goBack() {
    const frame = document.getElementsByName('citrus-frame')[0];
    if (frame) frame.contentWindow.history.back();
}

function goForward() {
    const frame = document.getElementsByName('citrus-frame')[0];
    if (frame) frame.contentWindow.history.forward();
}

function refreshPage() {
    const icon = document.getElementById('refresh-icon');
    const frame = document.getElementsByName('citrus-frame')[0];
    
    if (icon) {
        icon.classList.remove('spinning');
        requestAnimationFrame(() => {
            icon.classList.add('spinning');
        });
        setTimeout(() => icon.classList.remove('spinning'), 1000);
    }
    if (frame) frame.src = frame.src;
}

window.onload = () => createTab();
</script>
</body>
</html>
